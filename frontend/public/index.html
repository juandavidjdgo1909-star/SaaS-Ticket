<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SaaS-Ticket - Gestión de Membresías y Facturación</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="notification" class="notification"></div>

  <div class="title">
    <h1>SaaS-Ticket</h1>
  </div>

  <div class="container">
    <div class="card" id="card">

      <div class="logo">

        <img src="assets/logo.png" alt="Logo SaaS-Ticket">
      </div>

      <form class="form login" id="loginForm" autocomplete="off">
        <h2>Login</h2>
        <div id="error" class="error-message"></div>
        <input type="text" id="loginUsername" placeholder="Correo Electrónico" required>
        <input type="password" id="loginPassword" placeholder="Contraseña" required>
        <button type="submit">Login</button>
        <p>¿Aún no tienes cuenta? <span id="goRegister">Regístrate</span></p>
      </form>

      <form class="form register" id="registerForm" autocomplete="off">
        <h2>Regístrate</h2>
        <input type="text" id="registerUsername" placeholder="Nombre Completo" required autocomplete="name">
        <input type="email" id="registerEmail" placeholder="Correo Electrónico" required autocomplete="email">
        <input type="password" id="registerPassword" placeholder="Contraseña" required autocomplete="new-password">
        
        <div class="role-selector">
          <label>Rol:</label>
          <select id="roleSelect">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <input type="password" id="adminCode" placeholder="Código de Administrador" style="display: none;">

        <button type="submit">Registrarse</button>
        <p>¿Ya tienes cuenta? <span id="goLogin">Login</span></p>
      </form>

      <div class="overlay"></div>

    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
